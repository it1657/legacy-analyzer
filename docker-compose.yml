services:
  postgres:
    image: postgres:16-alpine
    container_name: legacy-analyzer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: analyzer_db
      POSTGRES_USER: analyzer
      POSTGRES_PASSWORD: analyzer123
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
