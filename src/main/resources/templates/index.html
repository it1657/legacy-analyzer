<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>레거시 코드 분석 시스템</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { padding-bottom: 15px; margin-bottom: 25px; border-bottom: 2px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 24px; color: #0d6efd; font-weight: bold; }
        .author { font-size: 14px; color: #6c757d; }
        .row { display: flex; gap: 20px; margin-bottom: 20px; }
        .col { flex: 1; display: flex; flex-direction: column; }
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #ced4da; overflow: hidden; display: flex; flex-direction: column; margin-bottom: 20px; }
        .card-header { padding: 12px 20px; font-weight: bold; color: white; display: flex; justify-content: space-between; align-items: center; }
        .bg-dark { background-color: #212529; }
        .bg-primary { background-color: #0d6efd; }
        .bg-success { background-color: #198754; }
        .badge { background: #6c757d; padding: 4px 8px; font-size: 11px; border-radius: 4px; }
        .card-body { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        textarea { width: 100%; border: 1px solid #ced4da; border-radius: 6px; font-family: 'Courier New', Courier, monospace; font-size: 14px; padding: 15px; box-sizing: border-box; resize: none; flex-grow: 1; }
        textarea:focus { outline: none; border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,0.25); }
        .input-group { display: flex; gap: 15px; align-items: center; }
        .form-control { flex-grow: 1; padding: 12px; border: 1px solid #ced4da; border-radius: 6px; font-size: 15px; }
        .btn { background-color: #0d6efd; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background-color: #0b5ed7; }
        .btn-success { background-color: #198754; }
        .btn-success:hover { background-color: #157347; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>☕ Code Analyzer with Claude AI <span style="font-size: 14px; color: #6c757d; font-weight: normal; margin-left: 10px;">v2.0 고도화 버전</span></h1>
        <div class="author">작성자: <strong>정재훈</strong></div>
    </header>

    <!-- 상단 고도화 패널: 로컬 폴더 분석 지정창 -->
    <div class="card">
        <div class="card-header bg-success">📁 고도화 기능: 로컬 PC 프로젝트 폴더 통째로 분석 실행</div>
        <div class="card-body">
            <div class="input-group">
                <input type="text" id="folderPath" class="form-control" placeholder="분석할 대상을 입력하세요 (예: C:\project\test-code)">
                <button type="button" onclick="analyzeFolder()" class="btn btn-success">폴더 통째로 분석 및 문서 생성</button>
            </div>
        </div>
    </div>

    <!-- 하단 기본 패널: 2분할 텍스트 수동 분석창 -->
    <div class="row">
        <div class="col">
            <div class="card">
                <div class="card-header bg-dark">
                    <span>원본 소스 코드 입력 (수동 모드)</span>
                    <span class="badge">모든 레거시 소스 분석 가능</span>
                </div>
                <div class="card-body">
                    <textarea id="sourceCode" rows="18" placeholder="// 여기에 코드를 직접 붙여넣고 아래 버튼을 누르셔도 작동합니다..."></textarea>
                    <button type="button" onclick="sendCode()" class="btn" style="margin-top: 15px;">단일 코드 주석 생성 실행</button>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card">
                <div class="card-header bg-primary">AI 분석 모니터링 로그 & 코드 결과창</div>
                <div class="card-body">
                    <textarea id="resultCode" rows="21" readonly placeholder="분석 진행 프로세스 및 결과 코드가 여기에 출력됩니다..."></textarea>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. [기존 고도화] 텍스트 복사 붙여넣기 기능
    async function sendCode() {
        const code = document.getElementById('sourceCode').value;
        const resultArea = document.getElementById('resultCode');
        if(!code.trim()) { alert('코드를 입력해주세요!'); return; }
        resultArea.value = "Claude AI 분석 중... 잠시만 기다려주세요.";

        try {
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sourceCode: code })
            });
            const data = await response.json();
            resultArea.value = data.outputCode;
        } catch (error) {
            resultArea.value = "에러가 발생했습니다:\n" + error.message;
        }
    }

    // 2. [신규 고도화] 폴더 경로 통째로 분석 기능
    async function analyzeFolder() {
        const path = document.getElementById('folderPath').value;
        const resultArea = document.getElementById('resultCode');
        if(!path.trim()) { alert('분석할 로컬 프로젝트 폴더 경로를 입력해주세요!'); return; }

        resultArea.value = "⏳ 로컬 폴더 내부 탐색 및 파일 분석 일괄 처리 프로세스 가동 중...\n전체 파일 용량에 따라 수 초에서 수 분이 소요될 수 있습니다. 창을 닫지 마세요.";

        try {
            const response = await fetch('/api/analyze-folder', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ folderPath: path })
            });
            const data = await response.json();
            resultArea.value = data.log;
        } catch (error) {
            resultArea.value = "❌ 폴더 분석 통신 실패:\n" + error.message;
        }
    }
</script>
</body>
</html>
