<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>레거시 코드 분석 시스템</title>
    <!-- 외부 서버 오류를 방지하기 위해 순수 CSS로 깔끔한 디자인 직접 구현 -->
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { padding-bottom: 15px; margin-bottom: 25px; border-bottom: 2px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 24px; color: #0d6efd; font-weight: bold; }
        .author { font-size: 14px; color: #6c757d; }
        .row { display: flex; gap: 20px; }
        .col { flex: 1; display: flex; flex-direction: column; }
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #ced4da; overflow: hidden; display: flex; flex-direction: column; }
        .card-header { padding: 12px 20px; font-weight: bold; color: white; display: flex; justify-content: space-between; align-items: center; }
        .bg-dark { background-color: #212529; }
        .bg-primary { background-color: #0d6efd; }
        .badge { background: #6c757d; padding: 4px 8px; font-size: 11px; border-radius: 4px; }
        .card-body { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        textarea { width: 100%; border: 1px solid #ced4da; border-radius: 6px; font-family: 'Courier New', Courier, monospace; font-size: 14px; padding: 15px; box-sizing: border-box; resize: none; flex-grow: 1; }
        textarea:focus { outline: none; border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,0.25); }
        .btn { background-color: #0d6efd; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: background 0.2s; }
        .btn:hover { background-color: #0b5ed7; }
    </style>
</head>
<body>
<div class="container">
    <!-- 상단 헤더 타이틀 영역 -->
    <header>
        <h1>☕ Code Analyzer with Claude AI <span style="font-size: 14px; color: #6c757d; font-weight: normal; margin-left: 10px;">v1.0</span></h1>
        <div class="author">작성자: <strong>정재훈</strong></div>
    </header>

    <!-- 좌우 2분할 레이아웃 영역 -->
    <div class="row">
        <!-- 좌측: 입력 영역 -->
        <div class="col">
            <div class="card">
                <div class="card-header bg-dark">
                    <span>원본 소스 코드 입력</span>
                    <span class="badge">레거시 소스 분석 가능</span>
                </div>
                <div class="card-body">
                    <textarea id="sourceCode" rows="22" placeholder="// 여기에 분석할 레거시 소스 코드를 복사해서 붙여넣으세요..."></textarea>
                    <button type="button" onclick="sendCode()" class="btn">Claude 분석 및 주석 생성 요청 실행</button>
                </div>
            </div>
        </div>

        <!-- 우측: 출력 영역 -->
        <div class="col">
            <div class="card">
                <div class="card-header bg-primary">AI 분석 및 한글 주석 결과</div>
                <div class="card-body">
                    <textarea id="resultCode" rows="25" readonly placeholder="분석 완료된 소스 코드가 여기에 출력됩니다..."></textarea>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 1주차 통신 테스트용 자바스크립트 -->
<script>
    async function sendCode() {
        const code = document.getElementById('sourceCode').value;
        const resultArea = document.getElementById('resultCode');

        if(!code.trim()) { alert('분석할 코드를 입력해주세요!'); return; }
        resultArea.value = "Claude AI 분석 중... 시스템 구조를 파악하고 있습니다. 잠시만 기다려주세요.";

        try {
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sourceCode: code })
            });

            if (!response.ok) throw new Error('서버 응답 오류 (Status: ' + response.status + ')');

            const data = await response.json();
            resultArea.value = data.outputCode;
        } catch (error) {
            resultArea.value = "에러가 발생했습니다:\n" + error.message;
        }
    }
</script>
</body>
</html>
