# ===================================================================
# 1. 시스템 전역 인코딩 및 서버 설정 (Input length = 1 오류 완벽 방지)
# ===================================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# 서버 실행 포트 번호 고정
server.port=8082

# ===================================================================
# 2. Claude API 연동 설정 (향후 실제 연동 대비)
# ===================================================================
# 실제 API 호출 주소인 엔드포인트 게이트웨이 주소
anthropic.api.url=https://api.anthropic.com

# Claude API KEY는 환경 변수로 설정 (GitHub에 노출되지 않음)
# 설정하지 않으면 README 생성을 스킵함
anthropic.api.key=${CLAUDE_API_KEY:}

# ===================================================================
# 3. 파일 분석 제어 및 비즈니스 룰 스펙 설정
# ===================================================================
# 파일 크기 제한 (사용 안 함 - 청킹으로 자동 처리)
# 무제한으로 설정 (청킹이 모든 크기 처리)
app.analysis.max-file-size-bytes=2147483647

# 대용량 폴더 분석 시 톰캣이 패킷을 자르지 않도록 POST 최대 용량 확장 (50MB)
server.tomcat.max-http-form-post-size=52428800

# ===================================================================
# 3.5 병렬 분석 및 청킹 설정 (성능 튜닝)
# ===================================================================
# 병렬 처리 스레드 풀 크기 설정
# 0 = CPU 코어 기반 동적 설정 (권장: 코어수 × 2, 최소 8)
# 0이 아닌 경우 = 고정 크기
app.analysis.thread-pool-size=4

# 파일 청킹 설정 (대용량 파일 처리)
# 한 청크당 처리할 줄 수
app.analysis.chunk-size-lines=1000

# 청크 사이의 겹침 줄 수 (맥락 유지)
app.analysis.chunk-overlap-lines=100

# 자동 청킹을 시작할 파일 크기 (바이트)
# 이 크기 이상의 파일만 청킹 처리
app.analysis.chunking-threshold-bytes=153600

# 프로젝트별 특수 세부 지침 규칙 파일 이름 설정
app.analysis.system-prompt-filename=CLAUDE.md
app.analysis.custom-spec-filename=custom_spec.txt

# ===================================================================
# 4. Claude AI 정밀 모델 파라미터 제어 설정 (💡 추가된 영역)
# ===================================================================
# 호출할 Claude 인공지능 모델 버전 이름
anthropic.api.model=claude-sonnet-4-6

# AI 단일 응답당 최대 출력 허용 글자 수 (Token 단위 제한량)
# 256KB 파일 기준: 8192 tokens로 충분 (대부분의 파일 커버)
anthropic.api.max-tokens=8192

# ===================================================================
# 5. 에러 핸들링 및 재시도 설정 (성능 최적화)
# ===================================================================
# 최대 재시도 횟수 (2 → 1: 빠른 실패 처리, 실패 시 모의응답 사용)
app.analysis.max-retries=3

# 초기 재시도 대기 시간 (ms) (300 → 100: 매우 빠른 재시도)
app.analysis.initial-retry-delay-ms=100

# 최대 재시도 대기 시간 (ms) (5000 → 2000: 빠른 완료)
app.analysis.max-retry-delay-ms=2000

# 연결 타임아웃 (초) (5 → 3: 빠른 실패 감지)
app.analysis.connect-timeout-sec=10

# 읽기 타임아웃 (초) (15 → 10: Claude API 응답 대기 시간 단축)
app.analysis.read-timeout-sec=60

# ===================================================================
# 6. 세션 관리 및 진행 상황 저장 설정
# ===================================================================
# 세션 타임아웃 시간 (분)
app.analysis.session-timeout-minutes=240

# 자동 저장 간격 (초)
app.analysis.auto-save-interval-sec=30

# 세션 영속성 활성화 여부
app.analysis.enable-session-persistence=true

# 세션 저장 경로
app.analysis.session-storage-path=.analysis-sessions

# ===================================================================
# 7. 데이터베이스 설정
# ===================================================================
# Docker PostgreSQL 사용 시 postgres, 로컬 테스트 시 h2
spring.profiles.active=postgres

# ===================================================================
# 8. JWT 인증 설정
# ===================================================================
# JWT 비밀키 (최소 256비트 이상 권장)
jwt.secret-key=legacy-analyzer-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-security-2024

# JWT 토큰 유효기간 (밀리초) - 24시간 (테스트용)
jwt.expiration-ms=86400000

# ===================================================================
# 9. SSE 및 비동기 요청 타임아웃 설정 (중요!)
# ===================================================================
# SSE는 오래 유지되는 연결이므로 타임아웃을 충분히 길게 설정
# 분석 시간: 보통 5-10분, 최대 1시간
spring.mvc.async.request-timeout=3600000

# Tomcat 스레드 풀 설정 (동시 요청 처리)
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# ===================================================================
# 10. 로깅 설정
# ===================================================================
logging.level.com.legacy=DEBUG
logging.level.com.legacy.error=ERROR
logging.level.org.springframework.security=DEBUG
