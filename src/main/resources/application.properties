# ===================================================================
# 1. 시스템 전역 인코딩 및 서버 설정 (Input length = 1 오류 완벽 방지)
# ===================================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# 서버 실행 포트 번호 고정
server.port=8082

# ===================================================================
# 2. Claude API 연동 설정 (향후 실제 연동 대비)
# ===================================================================
# 실제 API 호출 주소인 엔드포인트 게이트웨이 주소
anthropic.api.url=https://api.anthropic.com

# 윈도우 환경 변수 호출 (만약 변수가 없을 경우 대비하여 가상 키 세팅)
anthropic.api.key=${CLAUDE_API_KEY:MOCK_KEY_FOR_TEST}

# ===================================================================
# 3. 파일 분석 제어 및 비즈니스 룰 스펙 설정
# ===================================================================
# 토큰 제한 방지를 위한 단일 파일 용량 임계치 설정 (524288 Byte = 512KB)
app.analysis.max-file-size-bytes=524288

# 대용량 폴더 분석 시 톰캣이 패킷을 자르지 않도록 POST 최대 용량 확장 (50MB)
server.tomcat.max-http-form-post-size=52428800

# 프로젝트별 특수 세부 지침 규칙 파일 이름 설정
app.analysis.system-prompt-filename=CLAUDE.md
app.analysis.custom-spec-filename=custom_spec.txt

# ===================================================================
# 4. Claude AI 정밀 모델 파라미터 제어 설정 (💡 추가된 영역)
# ===================================================================
# 호출할 Claude 인공지능 모델 버전 이름
anthropic.api.model=claude-3-5-sonnet-20241022

# AI 단일 응답당 최대 출력 허용 글자 수 (Token 단위 제한량)
anthropic.api.max-tokens=4000

# ===================================================================
# 5. 에러 핸들링 및 재시도 설정
# ===================================================================
# 최대 재시도 횟수
app.analysis.max-retries=5

# 초기 재시도 대기 시간 (ms)
app.analysis.initial-retry-delay-ms=1000

# 최대 재시도 대기 시간 (ms)
app.analysis.max-retry-delay-ms=30000

# 연결 타임아웃 (초)
app.analysis.connect-timeout-sec=10

# 읽기 타임아웃 (초)
app.analysis.read-timeout-sec=30

# ===================================================================
# 6. 세션 관리 및 진행 상황 저장 설정
# ===================================================================
# 세션 타임아웃 시간 (분)
app.analysis.session-timeout-minutes=240

# 자동 저장 간격 (초)
app.analysis.auto-save-interval-sec=30

# 세션 영속성 활성화 여부
app.analysis.enable-session-persistence=true

# 세션 저장 경로
app.analysis.session-storage-path=.analysis-sessions

# ===================================================================
# 7. H2 데이터베이스 설정
# ===================================================================
spring.datasource.url=jdbc:h2:file:./data/analyzer-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 콘솔 활성화 (선택사항)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA 설정
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# 8. JWT 인증 설정
# ===================================================================
# JWT 비밀키 (최소 256비트 이상 권장)
jwt.secret-key=legacy-analyzer-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-security-2024

# JWT 토큰 유효기간 (밀리초) - 15분
jwt.expiration-ms=900000

# ===================================================================
# 9. 로깅 설정
# ===================================================================
logging.level.com.legacy=INFO
logging.level.com.legacy.error=ERROR
logging.level.org.springframework.security=DEBUG
