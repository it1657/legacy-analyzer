# 서버 실행 포트 번호 고정
server.port=8081

# Claude API 기본 주소값 설정
anthropic.api.url=https://anthropic.com

# 윈도우 환경 변수 호출 (만약 변수가 없을 경우 대비하여 플레이스홀더를 콜론 뒤에 입력)
anthropic.api.key=${CLAUDE_API_KEY:MOCK_KEY_FOR_TEST}

# 토큰 제한 방지를 위한 단일 파일 용량 임계치 설정 (단위: Byte)
# 524288 = 512KB (Claude 3.5 Sonnet의 넉넉한 Context Window에 맞춰 확장 조정)
app.analysis.max-file-size-bytes=524288

# 프로젝트별 특수 세부 지침 규칙 파일 이름 설정
# 자바 코드를 건드리지 않고 이 이름만 바꾸면 원하는 파일(예: 사내비즈니스규칙.txt)로 즉시 바뀝니다.
app.analysis.custom-spec-filename=custom_spec.txt


