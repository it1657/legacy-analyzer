# ===================================================================
# PostgreSQL 프로필 설정
# DatasourceAutoSelector가 localhost:5432 감지 시 자동 활성화
# 수동 활성화: -Dspring.profiles.active=postgres
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/analyzer_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=analyzer
spring.datasource.password=analyzer123

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
